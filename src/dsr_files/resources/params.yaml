# Key for file type dict must match the preferred extension of the FileType member (use lstrip(".") to remove the dot)
# Keys for nested dicts for each file type must be "save" or "load"
csv:
  save:
    - sep
    - na_rep
    - float_format
    - columns
    - header
    - index
    - index_label
    - mode
    - encoding
    - compression
    - quoting
    - quotechar
    - lineterminator
    - chunksize
    - date_format
    - doublequote
    - escapechar
    - decimal
    - errors
    - storage_options
  load:
    - sep
    - header
    - names
    - index_col
    - usecols
    - dtype
    - engine
    - converters
    - true_values
    - false_values
    - skipinitialspace
    - skiprows
    - skipfooter
    - nrows
    - na_values
    - keep_default_na
    - na_filter
    - verbose
    - skip_blank_lines
    - parse_dates
    - infer_datetime_format
    - keep_date_col
    - date_parser
    - dayfirst
    - cache_dates
    - iterator
    - chunksize
    - compression
    - thousands
    - decimal
    - lineterminator
    - quotechar
    - quoting
    - doublequote
    - escapechar
    - comment
    - encoding
    - dialect
    - storage_options

parquet:
  save:
    - engine
    - compression
    - index
    - partition_cols
    - storage_options
    - custom_metadata
  load:
    - engine
    - columns
    - storage_options
    - filesystem
    - filters

json:
  save:
    - skipkeys
    - ensure_ascii
    - check_circular
    - allow_nan
    - cls
    - indent
    - separators
    - default
    - sort_keys
  load:
    - cls
    - object_hook
    - parse_float
    - parse_int
    - parse_constant
    - object_pairs_hook

joblib:
  save:
    - compress
    - protocol
  load:
    - mmap_mode
    - ensure_native_byte_order